<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보관하역론 기출 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a237e,#283593);min-height:100vh;padding:14px;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:780px}
h1{color:#fff;text-align:center;font-size:1.4em;margin-bottom:3px}
.sub{color:rgba(255,255,255,.7);text-align:center;font-size:.82em;margin-bottom:12px}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:10px 6px;border:none;border-radius:10px;cursor:pointer;font-size:.88em;font-weight:700;transition:all .15s}
.tab.on{background:#fff;color:#1a237e}
.tab:not(.on){background:rgba(255,255,255,.18);color:#fff}
.stats{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.18);border-radius:30px;padding:7px 18px;color:#fff;margin-bottom:10px;font-size:.88em}
.stats b{font-size:1.15em}
.prog-wrap{background:rgba(255,255,255,.2);border-radius:4px;height:6px;margin-bottom:12px}
.prog-fill{height:100%;background:#69f0ae;border-radius:4px;transition:width .3s}
.controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.ctrl{padding:6px 13px;border:2px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:18px;cursor:pointer;font-size:.78em;transition:background .15s}
.ctrl:hover,.ctrl.on{background:rgba(255,255,255,.25)}
select.ctrl{appearance:none;-webkit-appearance:none}
select.ctrl option{color:#333;background:#fff}

/* CARD */
.card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.25);margin-bottom:12px;min-height:260px}
.year-badge{display:inline-block;padding:2px 11px;border-radius:20px;font-size:.72em;font-weight:700;color:#fff;margin-bottom:10px}
.badge-2024{background:#e53935}.badge-2025말{background:#8e24aa}.badge-2025중{background:#1e88e5}.badge-2021{background:#00897b}

.q-en{font-size:.97em;color:#222;line-height:1.6;margin-bottom:8px}
.q-ko{font-size:.88em;color:#5c6bc0;background:#f3f4fb;padding:8px 12px;border-radius:8px;line-height:1.55;margin-bottom:14px}
.ko-label{font-size:.72em;color:#9e9e9e;font-weight:600;margin-bottom:3px}

/* SHORT ANSWER */
.ans-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.ans-input{flex:1;min-width:180px;padding:9px 14px;border:2px solid #ddd;border-radius:9px;font-size:1em;outline:none;transition:border .15s}
.ans-input:focus{border-color:#3949ab}
.ans-input.ok{border-color:#43a047;background:#f1f8e9}
.ans-input.bad{border-color:#e53935;background:#fff3f3}
.btn-check{padding:9px 20px;background:#3949ab;color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:.9em;font-weight:700}
.btn-show{padding:9px 14px;background:#ff7043;color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:.85em}
.answer-box{display:none;margin-top:10px;padding:11px 14px;border-radius:9px;font-size:.95em;line-height:1.5}
.answer-box.ok-fb{background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32}
.answer-box.wrong-fb{background:#ffebee;border:1px solid #ef9a9a;color:#c62828}
.answer-box.reveal-fb{background:#e8eaf6;border:1px solid #9fa8da;color:#283593}

/* MULTIPLE CHOICE */
.mc-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.mc-opt{padding:10px 14px;border:2px solid #ddd;border-radius:9px;cursor:pointer;font-size:.9em;transition:all .15s;line-height:1.4}
.mc-opt:hover{border-color:#3949ab;background:#f3f4fb}
.mc-opt.selected-ok{border-color:#43a047;background:#e8f5e9;color:#2e7d32;font-weight:700}
.mc-opt.selected-bad{border-color:#e53935;background:#ffebee;color:#c62828}
.mc-opt.show-correct{border-color:#43a047;background:#e8f5e9;color:#2e7d32;font-weight:700}
.mc-opt.disabled{pointer-events:none}

/* CALC */
.calc-box{background:#f5f5f5;border-radius:9px;padding:14px;font-size:.88em;color:#333;line-height:1.7;margin-bottom:10px}
.calc-box table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.95em}
.calc-box td,.calc-box th{border:1px solid #ccc;padding:5px 8px;text-align:center}
.calc-box th{background:#e8eaf6;font-weight:700}
.btn-ko{padding:5px 13px;background:rgba(92,107,192,.12);color:#5c6bc0;border:1.5px solid #9fa8da;border-radius:16px;cursor:pointer;font-size:.78em;margin-bottom:8px;display:inline-block}
.btn-ko:hover{background:rgba(92,107,192,.25)}
.btn-reveal{padding:10px 22px;background:#ff7043;color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:.92em;font-weight:700;width:100%;margin-bottom:8px}
.solution-box{display:none;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:9px;padding:14px;font-size:.88em;color:#1b5e20;line-height:1.7}
.solution-box b{color:#2e7d32}

/* NAV */
.nav-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btn-prev,.btn-next{padding:9px 22px;border:2px solid rgba(255,255,255,.55);background:transparent;color:#fff;border-radius:20px;cursor:pointer;font-size:.88em;transition:background .15s}
.btn-prev:hover,.btn-next:hover{background:rgba(255,255,255,.2)}
.btn-next{background:rgba(255,255,255,.2)}

/* RESULTS */
#resultCard{display:none;text-align:center;padding:20px}
#resultCard h2{color:#3949ab;font-size:1.8em;margin-bottom:10px}
#resultCard .sc{font-size:3em;font-weight:900;color:#283593}
#resultCard p{color:#555;margin-bottom:16px}
.btn-again{padding:11px 28px;background:#3949ab;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:.95em;font-weight:700;margin:5px}

#comboEl{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);background:#ff6f00;color:#fff;padding:10px 28px;border-radius:40px;font-size:1.4em;font-weight:900;pointer-events:none;z-index:999;opacity:0;transition:transform .2s,opacity .2s}

/* PAGE SWITCHER */
.page-tabs{display:flex;gap:8px;margin-bottom:12px}
.ptab{flex:1;padding:10px 6px;border:none;border-radius:12px;cursor:pointer;font-size:.9em;font-weight:700;transition:all .15s}
.ptab.on{background:#fff;color:#1a237e}
.ptab:not(.on){background:rgba(255,255,255,.18);color:#fff}

/* CHAPTER QUIZ PAGE */
#chapterPage{display:none}
.ch-badge{display:inline-block;padding:3px 13px;border-radius:20px;font-size:.75em;font-weight:700;color:#fff;margin-bottom:10px}
.ch-controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.ch-stabs{display:flex;gap:7px;margin-bottom:10px}
.ch-stab{flex:1;padding:9px 6px;border:none;border-radius:10px;cursor:pointer;font-size:.84em;font-weight:700;transition:all .15s}
.ch-stab.on{background:#fff;color:#1a237e}
.ch-stab:not(.on){background:rgba(255,255,255,.18);color:#fff}

/* STUDY PAGE */
#studyPage{display:none}
.study-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.yr-header{color:#fff;font-size:.95em;font-weight:700;margin:14px 0 6px;padding:4px 16px;background:rgba(255,255,255,.2);border-radius:20px;display:inline-block}
.sa-entry{background:#fff;border-radius:14px;padding:15px 18px;margin-bottom:9px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.sa-term{font-size:1.05em;font-weight:700;color:#1a237e;margin-bottom:3px}
.sa-term-ko{font-size:.85em;color:#5c6bc0;font-weight:600;margin-bottom:8px}
.sa-def{font-size:.88em;color:#333;background:#f3f4fb;border-left:3px solid #3949ab;padding:8px 12px;border-radius:0 8px 8px 0;line-height:1.65;margin-bottom:5px}
.sa-def-ko{font-size:.82em;color:#888;padding-left:4px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <h1>보관하역론 기출 퀴즈 📦</h1>
  <p class="sub">2021·2024·2025(중간·기말) 기출 통합 | 정답은 직접 맞춰보기</p>

  <div class="page-tabs">
    <button class="ptab on" onclick="switchPage('quiz')">🎮 족보 퀴즈</button>
    <button class="ptab" onclick="switchPage('chapter')">📗 챕터 퀴즈</button>
    <button class="ptab" onclick="switchPage('study')">📋 단답형 정리본</button>
  </div>

  <div id="quizPage">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('short')">📝 단답형 (40문)</button>
    <button class="tab" onclick="switchTab('calc')">🔢 계산형 (18문)</button>
    <button class="tab" onclick="switchTab('mc')">🔘 객관식 (40문)</button>
  </div>

  <div class="stats">
    <span>점수 <b id="sc">0</b></span>
    <span>🔥 <b id="streak">0</b>연속</span>
    <span id="qcount">1 / 1</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <div class="controls">
    <label style="color:#fff;font-size:.8em;align-self:center">년도:</label>
    <select class="ctrl" id="yearFilter" onchange="applyFilter()">
      <option value="all">전체</option>
      <option value="2024기말">2024 기말</option>
      <option value="2025말">2025 기말</option>
      <option value="2025중">2025 중간</option>
      <option value="2021기말">2021 기말</option>
    </select>
    <button class="ctrl" onclick="doShuffle()">🔀 셔플</button>
  </div>

  <div class="card" id="mainCard">
    <div id="gameArea"><!-- rendered by JS --></div>
    <div id="resultCard">
      <h2>🎉 완료!</h2>
      <div class="sc" id="finalSc"></div>
      <p id="finalMsg"></p>
      <button class="btn-again" onclick="doShuffle()">🔀 다시 풀기</button>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn-prev" onclick="go(-1)">← 이전</button>
    <button class="btn-next" onclick="go(1)">다음 →</button>
  </div>
  </div><!-- /quizPage -->

  <div id="chapterPage">
    <div class="ch-stabs">
      <button class="ch-stab on" onclick="switchChTab('mc')">🔘 챕터 객관식 (163)</button>
      <button class="ch-stab" onclick="switchChTab('ascm')">📝 ASCM 단답형 (44)</button>
    </div>

    <!-- 챕터 객관식 -->
    <div id="chMCArea">
      <div class="stats">
        <span>점수 <b id="ch-sc">0</b></span>
        <span>🔥 <b id="ch-streak">0</b>연속</span>
        <span id="ch-qcount">1 / 1</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="ch-prog" style="width:0%"></div></div>
      <div class="ch-controls">
        <label style="color:#fff;font-size:.8em">챕터:</label>
        <select class="ctrl" id="chFilter" onchange="applyChFilter()">
          <option value="all">전체 (163문제)</option>
          <option value="Ch.1">Ch.1 Introduction (14)</option>
          <option value="Ch.2">Ch.2 Production Planning (10)</option>
          <option value="Ch.3">Ch.3 Master Scheduling (11)</option>
          <option value="Ch.4">Ch.4 MRP (15)</option>
          <option value="Ch.5">Ch.5 Capacity Mgmt (12)</option>
          <option value="Ch.6">Ch.6 PAC (17)</option>
          <option value="Ch.7">Ch.7 Purchasing (20)</option>
          <option value="Ch.8">Ch.8 Forecasting (16)</option>
          <option value="Ch.9">Ch.9 Inventory (21)</option>
          <option value="Ch.10">Ch.10 Order Qty (3)</option>
          <option value="Ch.11">Ch.11 Indep. Demand (11)</option>
          <option value="Ch.12">Ch.12 Warehouse (13)</option>
        </select>
        <button class="ctrl" onclick="doChShuffle()">🔀 셔플</button>
      </div>
      <div class="card" id="ch-mainCard">
        <div id="ch-gameArea"></div>
        <div id="ch-resultCard" style="display:none;text-align:center;padding:20px">
          <h2 style="color:#2e7d32;font-size:1.8em;margin-bottom:10px">🎉 완료!</h2>
          <div style="font-size:3em;font-weight:900;color:#1b5e20" id="ch-finalSc"></div>
          <p id="ch-finalMsg" style="color:#555;margin-bottom:16px"></p>
          <button class="btn-again" style="background:#388e3c" onclick="doChShuffle()">🔀 다시 풀기</button>
        </div>
      </div>
      <div class="nav-row">
        <button class="btn-prev" onclick="goCh(-1)">← 이전</button>
        <button class="btn-next" onclick="goCh(1)">다음 →</button>
      </div>
    </div>

    <!-- ASCM 단답형 -->
    <div id="chASCMArea" style="display:none">
      <div class="stats">
        <span>점수 <b id="ascm-sc">0</b></span>
        <span>🔥 <b id="ascm-streak">0</b>연속</span>
        <span id="ascm-qcount">1 / 1</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="ascm-prog" style="width:0%"></div></div>
      <div class="ch-controls">
        <label style="color:#fff;font-size:.8em">챕터:</label>
        <select class="ctrl" id="ascmChFilter" onchange="applyAscmFilter()">
          <option value="all">전체 (44문제)</option>
          <option value="Ch.2">Ch.2 Production Planning (5)</option>
          <option value="Ch.3">Ch.3 Master Scheduling (4)</option>
          <option value="Ch.4">Ch.4 MRP (2)</option>
          <option value="Ch.5">Ch.5 Capacity Mgmt (2)</option>
          <option value="Ch.6">Ch.6 PAC (8)</option>
          <option value="Ch.7">Ch.7 Purchasing (10)</option>
          <option value="Ch.8">Ch.8 Forecasting (2)</option>
          <option value="Ch.9">Ch.9 Inventory (2)</option>
          <option value="Ch.10">Ch.10 Order Qty (2)</option>
          <option value="Ch.11">Ch.11 Indep. Demand (6)</option>
          <option value="Ch.12">Ch.12 Warehouse (1)</option>
        </select>
        <button class="ctrl" onclick="doAscmShuffle()">🔀 셔플</button>
      </div>
      <div class="card">
        <div id="ascm-gameArea"></div>
        <div id="ascm-resultCard" style="display:none;text-align:center;padding:20px">
          <h2 style="color:#3949ab;font-size:1.8em;margin-bottom:10px">🎉 완료!</h2>
          <div style="font-size:3em;font-weight:900;color:#283593" id="ascm-finalSc"></div>
          <p id="ascm-finalMsg" style="color:#555;margin-bottom:16px"></p>
          <button class="btn-again" onclick="doAscmShuffle()">🔀 다시 풀기</button>
        </div>
      </div>
      <div class="nav-row">
        <button class="btn-prev" onclick="goAscm(-1)">← 이전</button>
        <button class="btn-next" onclick="goAscm(1)">다음 →</button>
      </div>
    </div>
  </div>

  <div id="studyPage">
    <div class="study-controls">
      <label style="color:#fff;font-size:.82em">년도:</label>
      <select class="ctrl" id="studyYearFilter" onchange="renderStudy()">
        <option value="all">전체</option>
        <option value="2024기말">2024 기말</option>
        <option value="2025말">2025 기말</option>
        <option value="2025중">2025 중간</option>
        <option value="2021기말">2021 기말</option>
      </select>
    </div>
    <div id="studyList"></div>
  </div>
</div>
<div id="comboEl"></div>

<script>
/* ========== DATA ========== */

const SA = [ // Short Answer: [year, no, en, ko, answer, answerKo, altAnswers]
["2024기말",1,"Those competitive characteristics that cause a firm's customers to choose that firm's goods and services over those of its competitors.",
 "기업의 고객이 경쟁사 제품 대신 해당 기업의 제품/서비스를 선택하게 만드는 경쟁적 특성","Order winners","주문 획득 요인",["order winner"]],

["2024기말",2,"A set inventory level where, if the total stock on hand plus on order falls to or below that point, action is taken to replenish the stock.",
 "보유 재고와 발주 잔량의 합이 이 수준 이하로 떨어지면 재고 보충 조치를 취하는 설정 재고 수준","Order point","발주점",["reorder point","re-order point","order point"]],

["2024기말",3,"The stages a new product goes through from beginning to end: introduction through growth, maturity, and decline.",
 "신제품이 도입 → 성장 → 성숙 → 쇠퇴 단계를 거치는 수명 과정","Product life cycle","제품 수명 주기",["plc","product lifecycle"]],

["2024기말",4,"In just-in-time philosophy, an approach to level production throughout the supply chain to match the planned rate of end product sales.",
 "JIT 철학에서 완제품 판매 계획 속도에 맞춰 공급망 전체 생산을 평준화하는 접근법","Heijunka","헤이준카 / 평준화 생산",[]],

["2024기말",5,"A specific production area consisting of one or more people and/or machines with similar capabilities, considered as one unit for capacity planning.",
 "유사한 능력의 사람/기계로 구성된 특정 생산 구역. 생산능력 계획의 단위","Work center","작업 센터",["workcenter","work centre"]],

["2024기말",6,"A product design or supply chain strategy that deliberately delays final differentiation of a product until the latest possible time.",
 "가능한 마지막 시점까지 제품의 최종 차별화(조립·포장 등)를 의도적으로 지연시키는 전략","Postponement","지연 차별화",[]],

["2024기말",7,"A means of optimizing supply chain performance in which the supplier has access to the customer's inventory data and is responsible for maintaining inventory levels.",
 "공급자가 고객의 재고 데이터에 접근해 고객이 요구하는 재고 수준을 유지할 책임을 지는 방식","Vendor managed inventory","공급자 관리 재고 (VMI)",["vmi","vendor-managed inventory"]],

["2024기말",8,"A method of JIT production using standard containers with a single card attached. A pull system where work centers signal to withdraw parts from suppliers.",
 "표준 컨테이너에 카드를 부착하는 JIT 생산 방식. 작업 센터가 카드로 부품 인출 신호를 보내는 풀 시스템","Kanban","칸반",[]],

["2024기말",9,"Goods in various stages of completion throughout the plant, from released raw material through completely processed material awaiting final inspection.",
 "공장 내 원자재 불출부터 최종 검사 대기 완성품까지 다양한 완성 단계에 있는 재공품","Work in process","재공품 (WIP)",["wip","work-in-process","work in progress"]],

["2024기말",10,"A facility, function, department, or resource whose capacity is less than the demand placed upon it.",
 "요구 수요보다 생산능력이 부족한 시설, 기능, 부서 또는 자원","Bottleneck","병목",[]],

["2025말",1,"The level of production or volume of sales at which operations are neither profitable nor unprofitable. Intersection of total revenue and total cost.",
 "수익도 손실도 없는 생산량/판매량 수준. 총수익과 총비용의 교차점","Break-even point","손익분기점 (BEP)",["bep","break even point","breakeven point"]],

["2025말",3,"A unique code used by warehouses, distribution centers, and retailers to identify and track inventory.",

["2025말",4,"Conformance to requirements or fitness for use.",
 "요구사항에의 적합성 또는 사용 목적에의 적합성","Quality","품질",[]],

["2025말",5,"A quantity of stock planned to be in inventory to protect against fluctuations in demand or supply.",

/* ========== STATE ========== */
let curTab='short', deck=[], idx=0, score=0, streak=0, answered=false;
const badgeClass={
  "2024기말":"badge-2024","2025말":"badge-2025말",
  "2025중":"badge-2025중","2021기말":"badge-2021"
};
const badgeLabel={
  "2024기말":"2024 기말","2025말":"2025 기말",
  "2025중":"2025 중간","2021기말":"2021 기말"
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function getSource(tab){
  const yr=document.getElementById('yearFilter').value;
  let src = tab==='short'?SA : tab==='calc'?CALC : MC;
  if(yr!=='all') src=src.filter(r=>r[0]===yr);
  return src;
}

function buildDeck(){
  deck=shuffle([...getSource(curTab)]);
  idx=0;score=0;streak=0;answered=false;
  document.getElementById('sc').textContent='0';
  document.getElementById('streak').textContent='0';
}

function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('on',['short','calc','mc'][i]===t);
  });
  buildDeck();
  render();
}

function applyFilter(){buildDeck();render();}
function doShuffle(){buildDeck();render();}

function go(dir){
  if(dir===1 && idx<deck.length-1){idx++;answered=false;render();}
  else if(dir===-1 && idx>0){idx--;answered=false;render();}
}

function updateProgress(){
  document.getElementById('qcount').textContent=`${idx+1} / ${deck.length}`;
  document.getElementById('prog').style.width=`${((idx+1)/deck.length)*100}%`;
}

/* ========== RENDER ========== */
function render(){
  updateProgress();
  const ga=document.getElementById('gameArea');
  const rc=document.getElementById('resultCard');
  ga.style.display='block';rc.style.display='none';

  const row=deck[idx];
  if(!row){ga.innerHTML='<p style="text-align:center;color:#999;padding:30px">해당 조건에 문제가 없습니다</p>';return;}

  if(curTab==='short') renderShort(ga,row);
  else if(curTab==='calc') renderCalc(ga,row);
  else renderMC(ga,row);
}

function badge(year){
  return `<span class="year-badge ${badgeClass[year]||''}">${badgeLabel[year]||year}</span>`;
}

function renderShort(ga,row){
  const [year,no,en,ko,ans,ansKo]=row;
  ga.innerHTML=`
    ${badge(year)}
    <div class="q-en"><b>Q${no}.</b> ${en}</div>
    <button class="btn-ko" onclick="toggleKo(this)">🇰🇷 한국어 번역 보기</button>
    <div class="q-ko" id="koBox" style="display:none">${ko}</div>
    <div class="ans-row">
      <input class="ans-input" id="ai" placeholder="영어 용어를 입력하세요..." autocomplete="off" onkeydown="if(event.key==='Enter')checkShort()">
      <button class="btn-check" onclick="checkShort()">확인</button>
      <button class="btn-show" onclick="revealShort()">정답 보기</button>
    </div>
    <div class="answer-box" id="fb"></div>`;
  document.getElementById('ai').focus();
}

function checkShort(){
  if(answered)return;
  const row=deck[idx];
  const [year,no,en,ko,ans,ansKo,alts]=row;
  const input=document.getElementById('ai').value.trim();
  if(!input)return;
  answered=true;

  const norm=s=>s.toLowerCase().replace(/[()（）\-\s]/g,'').replace(/[.,]/g,'');
  const correct=norm(input)===norm(ans)||
    (alts||[]).some(a=>norm(input)===norm(a))||
    norm(ans).includes(norm(input))&&norm(input).length>=3;

  const ai=document.getElementById('ai');
  const fb=document.getElementById('fb');
  if(correct){
    score+=10;streak++;
    document.getElementById('sc').textContent=score;
    document.getElementById('streak').textContent=streak;
    ai.className='ans-input ok';
    fb.className='answer-box ok-fb';
    fb.innerHTML=`✅ 정답! <b>${ans}</b> (${ansKo})`;
    if(streak>=3)combo(streak);
  } else {
    streak=0;document.getElementById('streak').textContent='0';
    ai.className='ans-input bad';
    fb.className='answer-box wrong-fb';
    fb.innerHTML=`❌ 오답. 정답: <b>${ans}</b> (${ansKo})`;
  }
  fb.style.display='block';
}

function revealShort(){
  const [year,no,en,ko,ans,ansKo]=deck[idx];
  const fb=document.getElementById('fb');
  fb.className='answer-box reveal-fb';
  fb.innerHTML=`💡 정답: <b>${ans}</b> (${ansKo})`;
  fb.style.display='block';
}

function renderCalc(ga,row){
  const [year,no,title,titleKo,prob,sol]=row;
  ga.innerHTML=`
    ${badge(year)}
    <div style="font-size:1em;font-weight:700;color:#283593;margin-bottom:8px">Q${no}. ${title}</div>
    <button class="btn-ko" onclick="toggleKo(this)">🇰🇷 한국어 번역 보기</button>
    <div class="q-ko" id="koBox" style="display:none">📌 ${titleKo}</div>
    <div class="calc-box">${prob}</div>
    <button class="btn-reveal" onclick="toggleSol(this)">📊 풀이 & 정답 보기</button>
    <div class="solution-box" id="solBox">${sol}</div>`;
}

function toggleKo(btn){
  const box=document.getElementById('koBox');
  const show=box.style.display==='block';
  box.style.display=show?'none':'block';
  btn.textContent=show?'🇰🇷 한국어 번역 보기':'🙈 번역 닫기';
}

function toggleSol(btn){
  const sb=document.getElementById('solBox');
  const show=sb.style.display==='block';
  sb.style.display=show?'none':'block';
  btn.textContent=show?'📊 풀이 & 정답 보기':'🙈 풀이 닫기';
}

function stripKo(s){return s.replace(/\s*\([^)]*[가-힣][^)]*\)/g,'').trim();}

function renderMC(ga,row){
  const [year,no,qen,qko,A,B,C,D,ans,explanation]=row;
  const origOpts=[A,B,C,D];
  const origLabels=['A','B','C','D'];

  // 보기 섞기
  const opts=origOpts.map((text,i)=>({text,isCorrect:origLabels[i]===ans}));
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  const labels=['A','B','C','D'];
  const newCorrect=labels[opts.findIndex(o=>o.isCorrect)];

  const optsHtml=opts.map((o,i)=>
    `<div class="mc-opt" id="opt${labels[i]}" onclick="pickMC(this)"><b>${labels[i]})</b> ${stripKo(o.text)}</div>`
  ).join('');

  ga.innerHTML=`
    ${badge(year)}
    <div class="q-en"><b>Q${no}.</b> ${qen}</div>
    <button class="btn-ko" onclick="toggleKo(this)">🇰🇷 한국어 번역 보기</button>
    <div class="q-ko" id="koBox" style="display:none">${qko}</div>
    <div class="mc-opts" id="mcOpts">${optsHtml}</div>
    <div class="answer-box" id="fb"></div>`;

  // dataset에 데이터 저장 (인라인 onclick 문자열 탈출 문제 방지)
  const container=document.getElementById('mcOpts');
  container.dataset.correct=newCorrect;
  container.dataset.expl=explanation||'';
  opts.forEach((o,i)=>{ document.getElementById('opt'+labels[i]).dataset.full=o.text; });
}

function pickMC(el){
  if(answered)return;
  answered=true;
  const labels=['A','B','C','D'];
  const container=document.getElementById('mcOpts');
  const correct=container.dataset.correct;
  const expl=container.dataset.expl;
  const picked=el.id.replace('opt','');

  labels.forEach(l=>{
    const opt=document.getElementById('opt'+l);
    if(opt){
      opt.classList.add('disabled');
      if(opt.dataset.full) opt.innerHTML=`<b>${l})</b> ${opt.dataset.full}`;
    }
  });

  const pickedEl=document.getElementById('opt'+picked);
  const correctEl=document.getElementById('opt'+correct);
  const fb=document.getElementById('fb');

  if(picked===correct){
    score+=10;streak++;
    document.getElementById('sc').textContent=score;
    document.getElementById('streak').textContent=streak;
    pickedEl.classList.add('selected-ok');
    fb.className='answer-box ok-fb';
    fb.innerHTML=`✅ 정답! ${expl}`;
    if(streak>=3)combo(streak);
  } else {
    streak=0;document.getElementById('streak').textContent='0';
    pickedEl.classList.add('selected-bad');
    if(correctEl) correctEl.classList.add('show-correct');
    fb.className='answer-box wrong-fb';
    fb.innerHTML=`❌ 오답. 정답: <b>${correct}</b>. ${expl}`;
  }
  fb.style.display='block';
}

function combo(n){
  const el=document.getElementById('comboEl');
  el.textContent=n>=5?`🔥🔥 ${n}연속!`:`🔥 ${n}연속!`;
  el.style.transform='translate(-50%,-50%) scale(1)';el.style.opacity='1';
  setTimeout(()=>{el.style.transform='translate(-50%,-50%) scale(0)';el.style.opacity='0';},1100);
}

function switchPage(page){
  document.getElementById('quizPage').style.display=page==='quiz'?'block':'none';
  document.getElementById('chapterPage').style.display=page==='chapter'?'block':'none';
  document.getElementById('studyPage').style.display=page==='study'?'block':'none';
  const pages=['quiz','chapter','study'];
  document.querySelectorAll('.ptab').forEach((el,i)=>el.classList.toggle('on',pages[i]===page));
  if(page==='study') renderStudy();
  if(page==='chapter' && chDeck.length===0){buildChDeck();renderCh();}
}

function renderStudy(){
  const yr=document.getElementById('studyYearFilter').value;
  const filtered=yr==='all'?SA:SA.filter(r=>r[0]===yr);
  const years=[...new Set(filtered.map(r=>r[0]))];
  const order=["2024기말","2025말","2025중","2021기말"];
  years.sort((a,b)=>order.indexOf(a)-order.indexOf(b));

  const list=document.getElementById('studyList');
  list.innerHTML=years.map(y=>{
    const items=filtered.filter(r=>r[0]===y);
    const entries=items.map(r=>{
      const [year,no,en,ko,ans,ansKo]=r;
      return `<div class="sa-entry">
        <div class="sa-term">${ans}</div>
        <div class="sa-term-ko">${ansKo}</div>
        <div class="sa-def">${en}</div>
        <div class="sa-def-ko">${ko}</div>
      </div>`;
    }).join('');
    return `<div class="yr-header"><span class="year-badge ${badgeClass[y]||''}" style="font-size:.85em">${badgeLabel[y]||y}</span> 단답형 ${items.length}문제</div>${entries}`;
  }).join('');
}

/* ========== SUB-TAB SWITCHER ========== */
function switchChTab(tab){
  document.getElementById('chMCArea').style.display=tab==='mc'?'block':'none';
  document.getElementById('chASCMArea').style.display=tab==='ascm'?'block':'none';
  document.querySelectorAll('.ch-stab').forEach((el,i)=>el.classList.toggle('on',(i===0&&tab==='mc')||(i===1&&tab==='ascm')));
  if(tab==='ascm' && ascmDeck.length===0){buildAscmDeck();renderAscm();}
}

/* ========== ASCM STATE ========== */
let ascmDeck=[], ascmIdx=0, ascmScore=0, ascmStreak=0, ascmAnswered=false;

function getAscmFiltered(){
  const ch=document.getElementById('ascmChFilter').value;
  return ch==='all'?[...ASCM]:ASCM.filter(r=>r[0]===ch);
}
function buildAscmDeck(){
  const ch=document.getElementById('ascmChFilter').value;
  const indices=ch==='all'
    ?ASCM.map((_,i)=>i)
    :ASCM.reduce((acc,r,i)=>{if(r[0]===ch)acc.push(i);return acc;},[]);
  ascmDeck=[...indices];
  for(let i=ascmDeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ascmDeck[i],ascmDeck[j]]=[ascmDeck[j],ascmDeck[i]];}
  ascmIdx=0; ascmScore=0; ascmStreak=0; ascmAnswered=false;
  updateAscmProgress();
}
function applyAscmFilter(){buildAscmDeck();renderAscm();}
function doAscmShuffle(){buildAscmDeck();renderAscm();}
function goAscm(dir){
  if(ascmIdx+dir<0||ascmIdx+dir>=ascmDeck.length)return;
  ascmIdx+=dir; ascmAnswered=false; renderAscm();
}
function updateAscmProgress(){
  const el=document.getElementById('ascm-qcount');
  if(el) el.textContent=(ascmIdx+1)+' / '+ascmDeck.length;
  const bar=document.getElementById('ascm-prog');
  if(bar) bar.style.width=(ascmDeck.length?(ascmIdx+1)/ascmDeck.length*100:0)+'%';
  const sc=document.getElementById('ascm-sc');
  if(sc) sc.textContent=ascmScore;
  const st=document.getElementById('ascm-streak');
  if(st) st.textContent=ascmStreak;
}
function normAscm(s){return s.toLowerCase().replace(/[^a-z0-9가-힣]/g,'').trim();}
function renderAscm(){
  if(!ascmDeck.length){
    document.getElementById('ascm-gameArea').innerHTML='<p style="text-align:center;color:#ccc">선택한 챕터에 문제가 없습니다.</p>';
    return;
  }
  const row=ASCM[ascmDeck[ascmIdx]];
  const [ch,term,defn,koMeaning,alts]=row;
  const chColor=CH_COLORS[ch]||'#555';
  ascmAnswered=false;
  updateAscmProgress();
  document.getElementById('ascm-gameArea').innerHTML=`
    <div style="border-left:4px solid ${chColor};padding-left:12px;margin-bottom:8px">
      <span class="badge" style="background:${chColor}">${ch}</span>
    </div>
    <div class="q-en" style="font-size:1em;line-height:1.6;margin-bottom:14px">${defn}</div>
    <div>
      <input type="text" id="ascmInput" class="ans-input" placeholder="영어 용어 입력..."
        onkeydown="if(event.key==='Enter')checkAscm()"
        style="width:100%;padding:10px;font-size:1em;border-radius:8px;border:2px solid #ddd;box-sizing:border-box">
    </div>
    <div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn" onclick="checkAscm()" style="flex:1;background:#1a237e">제출</button>
      <button class="btn" onclick="revealAscm()" style="flex:1;background:#555">정답 보기</button>
    </div>
    <div id="ascmFeedback" style="margin-top:12px"></div>`;
  setTimeout(()=>{const inp=document.getElementById('ascmInput');if(inp)inp.focus();},100);
}
function checkAscm(){
  if(ascmAnswered)return;
  const inp=document.getElementById('ascmInput');
  if(!inp)return;
  const userVal=inp.value.trim();
  if(!userVal)return;
  const row=ASCM[ascmDeck[ascmIdx]];
  const [ch,term,defn,koMeaning,alts]=row;
  const correct=normAscm(term.replace(/\s*\(.*?\)\s*/g,' ').trim());
  const userNorm=normAscm(userVal);
  const altNorms=(alts||[]).map(a=>normAscm(a));
  const ok=userNorm===correct||altNorms.includes(userNorm);
  ascmAnswered=true;
  inp.disabled=true;
  if(ok){ascmScore++;ascmStreak++;}else{ascmStreak=0;}
  updateAscmProgress();
  const fb=document.getElementById('ascmFeedback');
  if(ok){
    fb.innerHTML=`<div style="color:#43a047;font-weight:700;font-size:1.1em">✅ 정답!</div><div style="margin-top:8px;font-weight:700;font-size:1.05em">${term}</div><div style="color:#aaa;margin-top:4px">${koMeaning}</div>`;
  }else{
    fb.innerHTML=`<div style="color:#e53935;font-weight:700;font-size:1.1em">❌ 오답</div><div style="margin-top:8px;color:#ff8a65">입력: ${userVal}</div><div style="font-weight:700;font-size:1.05em;margin-top:6px">정답: ${term}</div><div style="color:#aaa;margin-top:4px">${koMeaning}</div>`;
  }
}
function revealAscm(){
  if(ascmAnswered)return;
  const row=ASCM[ascmDeck[ascmIdx]];
  const [ch,term,defn,koMeaning,alts]=row;
  ascmAnswered=true;
  ascmStreak=0;
  updateAscmProgress();
  const inp=document.getElementById('ascmInput');
  if(inp) inp.disabled=true;
  const fb=document.getElementById('ascmFeedback');
  if(fb) fb.innerHTML=`<div style="color:#ffb300;font-weight:700">👁 정답 확인</div><div style="font-weight:700;font-size:1.05em;margin-top:8px">${term}</div><div style="color:#aaa;margin-top:4px">${koMeaning}</div>`;
}

/* ========== CHAPTER QUIZ STATE ========== */
let chDeck=[], chIdx=0, chScore=0, chStreak=0, chAnswered=false;

function getChFiltered(){
  const ch=document.getElementById('chFilter').value;
  return ch==='all'?[...CHMC]:CHMC.filter(r=>r[0]===ch);
}

function buildChDeck(){
  chDeck=shuffle([...getChFiltered()]);
  chIdx=0;chScore=0;chStreak=0;chAnswered=false;
  document.getElementById('ch-sc').textContent='0';
  document.getElementById('ch-streak').textContent='0';
}

function applyChFilter(){buildChDeck();renderCh();}
function doChShuffle(){buildChDeck();renderCh();}

function goCh(dir){
  if(dir===1&&chIdx<chDeck.length-1){chIdx++;chAnswered=false;renderCh();}
  else if(dir===-1&&chIdx>0){chIdx--;chAnswered=false;renderCh();}
}

function updateChProgress(){
  document.getElementById('ch-qcount').textContent=`${chIdx+1} / ${chDeck.length}`;
  document.getElementById('ch-prog').style.width=`${((chIdx+1)/chDeck.length)*100}%`;
}

function renderCh(){
  updateChProgress();
  const ga=document.getElementById('ch-gameArea');
  const rc=document.getElementById('ch-resultCard');
  ga.style.display='block';rc.style.display='none';
  const row=chDeck[chIdx];
  if(!row){ga.innerHTML='<p style="text-align:center;color:#999;padding:30px">문제가 없습니다</p>';return;}
  renderChMC(ga,row);
}

function renderChMC(ga,row){
  const [ch,no,q,A,B,C,D,ans]=row;
  const origOpts=[A,B,C,D];
  const origLabels=['A','B','C','D'];
  const opts=origOpts.map((text,i)=>({text,isCorrect:origLabels[i]===ans}));
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  const labels=['A','B','C','D'];
  const newCorrect=labels[opts.findIndex(o=>o.isCorrect)];
  const color=CH_COLORS[ch]||'#555';

  const optsHtml=opts.map((o,i)=>
    `<div class="mc-opt" id="ch-opt${labels[i]}" onclick="pickChMC(this)"><b>${labels[i]})</b> ${o.text}</div>`
  ).join('');

  ga.innerHTML=`
    <span class="ch-badge" style="background:${color}">${ch}</span>
    <div class="q-en"><b>Q${no}.</b> ${q}</div>
    <div class="mc-opts" id="ch-mcOpts">${optsHtml}</div>
    <div class="answer-box" id="ch-fb"></div>`;

  const container=document.getElementById('ch-mcOpts');
  container.dataset.correct=newCorrect;
  opts.forEach((o,i)=>{document.getElementById('ch-opt'+labels[i]).dataset.full=o.text;});
}

function pickChMC(el){
  if(chAnswered)return;
  chAnswered=true;
  const labels=['A','B','C','D'];
  const container=document.getElementById('ch-mcOpts');
  const correct=container.dataset.correct;
  const picked=el.id.replace('ch-opt','');

  labels.forEach(l=>{
    const opt=document.getElementById('ch-opt'+l);
    if(opt){
      opt.classList.add('disabled');
      if(opt.dataset.full) opt.innerHTML=`<b>${l})</b> ${opt.dataset.full}`;
    }
  });

  const pickedEl=document.getElementById('ch-opt'+picked);
  const correctEl=document.getElementById('ch-opt'+correct);
  const fb=document.getElementById('ch-fb');

  if(picked===correct){
    chScore+=10;chStreak++;
    document.getElementById('ch-sc').textContent=chScore;
    document.getElementById('ch-streak').textContent=chStreak;
    pickedEl.classList.add('selected-ok');
    fb.className='answer-box ok-fb';
    fb.innerHTML='✅ 정답!';
    if(chStreak>=3)combo(chStreak);
  } else {
    chStreak=0;document.getElementById('ch-streak').textContent='0';
    pickedEl.classList.add('selected-bad');
    if(correctEl)correctEl.classList.add('show-correct');
    fb.className='answer-box wrong-fb';
    fb.innerHTML=`❌ 오답. 정답: <b>${correct}</b>`;
  }
  fb.style.display='block';
}

// init
buildDeck();render();
</script>

</html>
